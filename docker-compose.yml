version: "3.8"
services:
  ucap-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=${APP_NAME:-UCAP-Agent-Demo}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DB_BACKEND=${DB_BACKEND:-sqlite}
      - DATABASE_URL=${DATABASE_URL}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-qwen3-flash}
      - MAX_TOKENS=${MAX_TOKENS:-2000}
      - TEMPERATURE=${TEMPERATURE:-0.7}
      - ENABLE_REDIS_CACHE=${ENABLE_REDIS_CACHE:-false}
      - REDIS_URL=${REDIS_URL:-redis://:redis@redis:6379/0}
      - DATABASE_PATH=/app/data/ucap_demo.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      - postgres
  redis:
    image: redis:7-alpine
    container_name: ucap-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
  postgres:
    image: postgres:15-alpine
    container_name: ucap-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ucap}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ucap_pwd}
      - POSTGRES_DB=${POSTGRES_DB:-ucap_demo}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  redis-data:
  pg-data:
